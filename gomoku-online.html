<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 - 在线对战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: "Microsoft YaHei", sans-serif;
    color: #eee;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }
  h1 {
    font-size: 32px;
    letter-spacing: 8px;
    color: #e6b422;
    text-shadow: 0 2px 8px rgba(230, 180, 34, 0.3);
  }
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
    background: #16213e;
    border-radius: 12px;
    border: 1px solid #333;
  }
  #lobby p { color: #aaa; font-size: 14px; }
  .lobby-btn {
    padding: 14px 36px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    width: 220px;
  }
  #createBtn {
    background: #e6b422;
    color: #1a1a2e;
    font-weight: bold;
  }
  #createBtn:hover { background: #f0c848; }
  .join-row {
    display: flex;
    gap: 8px;
  }
  #roomInput {
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid #444;
    border-radius: 8px;
    background: #0f3460;
    color: #eee;
    width: 140px;
    text-align: center;
    font-family: inherit;
    letter-spacing: 2px;
  }
  #roomInput::placeholder { color: #555; letter-spacing: 0; }
  #joinBtn {
    background: #0f3460;
    color: #aaa;
    border: 1px solid #444;
  }
  #joinBtn:hover { background: #1a4a7a; color: #ddd; }
  #gameArea { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .info-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .turn-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #16213e;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .turn-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #555;
  }
  .turn-dot.black { background: #111; }
  .turn-dot.white { background: #f5f5f5; }
  .role-badge {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
  }
  .role-black { background: #222; color: #fff; border: 1px solid #555; }
  .role-white { background: #eee; color: #333; border: 1px solid #aaa; }
  #status {
    font-size: 18px;
    color: #e6b422;
    min-width: 120px;
    text-align: center;
  }
  .room-info {
    padding: 8px 16px;
    background: #16213e;
    border-radius: 8px;
    border: 1px solid #333;
    font-size: 14px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .room-id { color: #e6b422; font-weight: bold; letter-spacing: 1px; }
  #copyLinkBtn {
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #0f3460;
    color: #aaa;
    cursor: pointer;
    font-family: inherit;
  }
  #copyLinkBtn:hover { background: #1a4a7a; color: #ddd; }
  canvas {
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .btn-row { display: flex; gap: 12px; }
  button {
    padding: 10px 28px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  #restartBtn {
    background: #e6b422;
    color: #1a1a2e;
    font-weight: bold;
  }
  #restartBtn:hover { background: #f0c848; transform: translateY(-1px); }
  #leaveBtn {
    background: #16213e;
    color: #aaa;
    border: 1px solid #333;
  }
  #leaveBtn:hover { background: #1a2744; color: #ddd; }
  .waiting-msg {
    color: #e6b422;
    font-size: 16px;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>五 子 棋</h1>
  <div id="lobby">
    <p>在线对战 · 邀请好友一起下棋</p>
    <button class="lobby-btn" id="createBtn">创建房间</button>
    <div class="join-row">
      <input type="text" id="roomInput" placeholder="房间号" maxlength="6">
      <button class="lobby-btn" id="joinBtn">加入</button>
    </div>
  </div>
  <div id="gameArea">
    <div class="room-info">
      房间：<span class="room-id" id="roomIdDisplay"></span>
      <button id="copyLinkBtn">复制链接</button>
    </div>
    <div class="info-bar">
      <div class="turn-indicator">
        <span>当前：</span>
        <div class="turn-dot black" id="turnDot"></div>
        <span id="turnText">黑棋</span>
      </div>
      <div id="roleBadge" class="role-badge role-black">黑棋</div>
      <div id="status"></div>
    </div>
    <div id="waitingMsg" class="waiting-msg">等待对手加入...</div>
    <canvas id="board"></canvas>
    <div class="btn-row">
      <button id="restartBtn">再来一局</button>
      <button id="leaveBtn">离开房间</button>
    </div>
  </div>
</div>

<script>
// ===== WebSocket 连接 =====
const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
let ws = null;
let myRole = null;
let roomId = null;
let board, currentPlayer, gameOver;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => console.log("已连接服务器");
  ws.onclose = () => { console.log("连接断开"); setTimeout(connectWS, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  if (msg.type === "created") {
    roomId = msg.roomId;
    myRole = msg.role;
    board = msg.board;
    currentPlayer = msg.turn;
    gameOver = false;
    enterGame();
    document.getElementById("waitingMsg").style.display = "block";
    draw();
  }
  if (msg.type === "joined") {
    roomId = msg.roomId;
    myRole = msg.role;
    board = msg.board;
    currentPlayer = msg.turn;
    gameOver = msg.status === "finished";
    enterGame();
    document.getElementById("waitingMsg").style.display = (msg.status === "waiting") ? "block" : "none";
    if (myRole === "spectator") {
      document.getElementById("roleBadge").textContent = "观战中";
      document.getElementById("roleBadge").className = "role-badge";
      document.getElementById("roleBadge").style.background = "#0f3460";
      document.getElementById("roleBadge").style.color = "#aaa";
    }
    updateTurn();
    draw();
  }
  if (msg.type === "start") {
    document.getElementById("waitingMsg").style.display = "none";
  }
  if (msg.type === "move") {
    board[msg.r][msg.c] = msg.player;
    playPlaceSound();
    draw();
  }
  if (msg.type === "turn") {
    currentPlayer = msg.turn;
    updateTurn();
  }
  if (msg.type === "win") {
    gameOver = true;
    const name = msg.winner === "black" ? "黑棋" : "白棋";
    document.getElementById("status").textContent = name + " 获胜!";
    setTimeout(playWinSound, 200);
  }
  if (msg.type === "restart") {
    board = msg.board;
    currentPlayer = msg.turn;
    gameOver = false;
    document.getElementById("status").textContent = "";
    // 交换角色显示
    if (myRole === "black") myRole = "white";
    else if (myRole === "white") myRole = "black";
    updateRoleBadge();
    updateTurn();
    draw();
  }
  if (msg.type === "opponent_left") {
    document.getElementById("status").textContent = "对手已离开";
    gameOver = true;
  }
  if (msg.type === "error") {
    alert(msg.msg);
  }
}

// ===== 音效 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === "suspended") audioCtx.resume();
}
function playPlaceSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.06;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = "bandpass"; filter.frequency.value = 800; filter.Q.value = 1.5;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  noise.connect(filter).connect(gain).connect(audioCtx.destination);
  noise.start(now); noise.stop(now + 0.08);
  const osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.05);
  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(0.2, now);
  oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  osc.connect(oscGain).connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.06);
}
function playWinSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = "triangle"; osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    const t = now + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.4);
  });
  const lastT = now + 0.6;
  const osc = audioCtx.createOscillator();
  osc.type = "sine"; osc.frequency.value = 1047;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, lastT);
  gain.gain.exponentialRampToValueAtTime(0.001, lastT + 0.8);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(lastT); osc.stop(lastT + 0.8);
}
function playInvalidSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = "sine"; osc.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.1);
}

// ===== 棋盘绘制 =====
const GRID = 15;
const CELL = 40;
const PADDING = 30;
const PIECE_R = 17;
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
canvas.width = canvas.height = PADDING * 2 + CELL * (GRID - 1);

function draw() {
  ctx.fillStyle = "#dcb35c";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "rgba(160, 120, 40, 0.15)";
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.height; i += 6) {
    ctx.beginPath();
    ctx.moveTo(0, i + Math.sin(i * 0.05) * 3);
    ctx.lineTo(canvas.width, i + Math.sin(i * 0.05 + 2) * 3);
    ctx.stroke();
  }
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;
  for (let i = 0; i < GRID; i++) {
    const pos = PADDING + i * CELL;
    ctx.beginPath(); ctx.moveTo(PADDING, pos); ctx.lineTo(PADDING + CELL * (GRID - 1), pos); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pos, PADDING); ctx.lineTo(pos, PADDING + CELL * (GRID - 1)); ctx.stroke();
  }
  const stars = [3, 7, 11];
  ctx.fillStyle = "#333";
  for (const r of stars) for (const c of stars) {
    ctx.beginPath(); ctx.arc(PADDING + c * CELL, PADDING + r * CELL, 4, 0, Math.PI * 2); ctx.fill();
  }
  for (let r = 0; r < GRID; r++) for (let c = 0; c < GRID; c++) {
    if (board && board[r] && board[r][c]) drawPiece(r, c, board[r][c]);
  }
}

function drawPiece(r, c, player) {
  const x = PADDING + c * CELL, y = PADDING + r * CELL;
  ctx.beginPath(); ctx.arc(x + 2, y + 2, PIECE_R, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fill();
  const grad = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, PIECE_R);
  if (player === 1) { grad.addColorStop(0, "#555"); grad.addColorStop(1, "#111"); }
  else { grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#ccc"); }
  ctx.beginPath(); ctx.arc(x, y, PIECE_R, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = player === 1 ? "#000" : "#999"; ctx.lineWidth = 1; ctx.stroke();
}

function updateTurn() {
  const dot = document.getElementById("turnDot");
  const text = document.getElementById("turnText");
  dot.className = "turn-dot " + (currentPlayer === 1 ? "black" : "white");
  text.textContent = currentPlayer === 1 ? "黑棋" : "白棋";
}

function updateRoleBadge() {
  const badge = document.getElementById("roleBadge");
  if (myRole === "black") { badge.textContent = "你是黑棋"; badge.className = "role-badge role-black"; }
  else if (myRole === "white") { badge.textContent = "你是白棋"; badge.className = "role-badge role-white"; }
}

function enterGame() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("gameArea").style.display = "flex";
  document.getElementById("roomIdDisplay").textContent = roomId;
  updateRoleBadge();
  updateTurn();
}

// ===== 落子 =====
canvas.addEventListener("click", (e) => {
  if (!board || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const c = Math.round((x - PADDING) / CELL);
  const r = Math.round((y - PADDING) / CELL);
  if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;
  if (board[r][c]) { playInvalidSound(); return; }
  const isMyTurn = (myRole === "black" && currentPlayer === 1) || (myRole === "white" && currentPlayer === 2);
  if (!isMyTurn) { playInvalidSound(); return; }
  ws.send(JSON.stringify({ type: "move", r, c }));
});

// ===== 按钮 =====
document.getElementById("createBtn").addEventListener("click", () => {
  ws.send(JSON.stringify({ type: "create" }));
});

document.getElementById("joinBtn").addEventListener("click", () => {
  const id = document.getElementById("roomInput").value.trim();
  if (!id) { alert("请输入房间号"); return; }
  ws.send(JSON.stringify({ type: "join", roomId: id }));
});

document.getElementById("roomInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("joinBtn").click();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  ws.send(JSON.stringify({ type: "restart" }));
});

document.getElementById("leaveBtn").addEventListener("click", () => {
  if (ws) ws.close();
  roomId = null;
  myRole = null;
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("gameArea").style.display = "none";
  connectWS();
});

document.getElementById("copyLinkBtn").addEventListener("click", () => {
  const url = location.origin + location.pathname + "#" + roomId;
  navigator.clipboard.writeText(url).then(() => {
    document.getElementById("copyLinkBtn").textContent = "已复制!";
    setTimeout(() => document.getElementById("copyLinkBtn").textContent = "复制链接", 1500);
  });
});

// 自动加入 URL hash 中的房间
if (location.hash) {
  const hashRoom = location.hash.substring(1);
  if (hashRoom) {
    connectWS();
    ws.addEventListener("open", () => {
      ws.send(JSON.stringify({ type: "join", roomId: hashRoom }));
    }, { once: true });
  }
} else {
  connectWS();
}
</script>
</body>
</html>
