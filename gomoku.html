<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: "Microsoft YaHei", sans-serif;
    color: #eee;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  h1 {
    font-size: 32px;
    letter-spacing: 8px;
    color: #e6b422;
    text-shadow: 0 2px 8px rgba(230, 180, 34, 0.3);
  }
  .info-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 18px;
  }
  .turn-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #16213e;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .turn-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #555;
  }
  .turn-dot.black { background: #111; }
  .turn-dot.white { background: #f5f5f5; }
  #status {
    font-size: 18px;
    color: #e6b422;
    min-width: 120px;
    text-align: center;
  }
  canvas {
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .btn-row {
    display: flex;
    gap: 12px;
  }
  button {
    padding: 10px 28px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  #restartBtn {
    background: #e6b422;
    color: #1a1a2e;
    font-weight: bold;
  }
  #restartBtn:hover { background: #f0c848; transform: translateY(-1px); }
  #undoBtn {
    background: #16213e;
    color: #aaa;
    border: 1px solid #333;
  }
  #undoBtn:hover { background: #1a2744; color: #ddd; }
  .score-board {
    display: flex;
    gap: 30px;
    font-size: 16px;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-num { color: #e6b422; font-weight: bold; font-size: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>五 子 棋</h1>
  <div class="info-bar">
    <div class="turn-indicator">
      <span>当前：</span>
      <div class="turn-dot black" id="turnDot"></div>
      <span id="turnText">黑棋</span>
    </div>
    <div id="status"></div>
  </div>
  <canvas id="board"></canvas>
  <div class="btn-row">
    <button id="restartBtn">重新开始</button>
    <button id="undoBtn">悔棋</button>
  </div>
  <div class="score-board">
    <div class="score-item">黑棋胜：<span class="score-num" id="blackScore">0</span></div>
    <div class="score-item">白棋胜：<span class="score-num" id="whiteScore">0</span></div>
    <div class="score-item">平局：<span class="score-num" id="drawScore">0</span></div>
  </div>
</div>

<script>
// ===== 音效模块 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

// 落子音效：模拟棋子敲击棋盘的"嗒"声
function playPlaceSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  // 冲击噪声（木头碰撞感）
  const bufferSize = audioCtx.sampleRate * 0.06;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  // 带通滤波让声音更像木头
  const filter = audioCtx.createBiquadFilter();
  filter.type = "bandpass";
  filter.frequency.value = 800;
  filter.Q.value = 1.5;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  noise.connect(filter).connect(gain).connect(audioCtx.destination);
  noise.start(now);
  noise.stop(now + 0.08);
  // 低频共鸣
  const osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.05);
  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(0.2, now);
  oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  osc.connect(oscGain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.06);
}

// 胜利音效：欢快的上升音阶
function playWinSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = "triangle";
    osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    const t = now + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.4);
  });
  // 最后一个长音加泛音
  const lastT = now + notes.length * 0.15;
  const osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.value = 1047;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, lastT);
  gain.gain.exponentialRampToValueAtTime(0.001, lastT + 0.8);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(lastT);
  osc.stop(lastT + 0.8);
}

// 落子无效音效（点击已有棋子时）
function playInvalidSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.1);
}

// ===== 游戏逻辑 =====
const GRID = 15;
const CELL = 40;
const PADDING = 30;
const PIECE_R = 17;
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
canvas.width = canvas.height = PADDING * 2 + CELL * (GRID - 1);

let board, history, currentPlayer, gameOver;
let scores = { black: 0, white: 0, draw: 0 };

function init() {
  board = Array.from({ length: GRID }, () => Array(GRID).fill(0));
  history = [];
  currentPlayer = 1; // 1=black, 2=white
  gameOver = false;
  document.getElementById("status").textContent = "";
  updateTurn();
  draw();
}

function draw() {
  // wood background
  ctx.fillStyle = "#dcb35c";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle wood grain
  ctx.strokeStyle = "rgba(160, 120, 40, 0.15)";
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.height; i += 6) {
    ctx.beginPath();
    ctx.moveTo(0, i + Math.sin(i * 0.05) * 3);
    ctx.lineTo(canvas.width, i + Math.sin(i * 0.05 + 2) * 3);
    ctx.stroke();
  }

  // grid lines
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;
  for (let i = 0; i < GRID; i++) {
    const pos = PADDING + i * CELL;
    ctx.beginPath();
    ctx.moveTo(PADDING, pos);
    ctx.lineTo(PADDING + CELL * (GRID - 1), pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, PADDING);
    ctx.lineTo(pos, PADDING + CELL * (GRID - 1));
    ctx.stroke();
  }

  // star points (天元 + 四星)
  const stars = [3, 7, 11];
  ctx.fillStyle = "#333";
  for (const r of stars) {
    for (const c of stars) {
      ctx.beginPath();
      ctx.arc(PADDING + c * CELL, PADDING + r * CELL, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // pieces
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      if (board[r][c]) drawPiece(r, c, board[r][c]);
    }
  }

  // last move marker
  if (history.length > 0) {
    const last = history[history.length - 1];
    const x = PADDING + last.c * CELL;
    const y = PADDING + last.r * CELL;
    ctx.strokeStyle = "#e6b422";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPiece(r, c, player) {
  const x = PADDING + c * CELL;
  const y = PADDING + r * CELL;

  // shadow
  ctx.beginPath();
  ctx.arc(x + 2, y + 2, PIECE_R, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fill();

  // piece
  const grad = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, PIECE_R);
  if (player === 1) {
    grad.addColorStop(0, "#555");
    grad.addColorStop(1, "#111");
  } else {
    grad.addColorStop(0, "#fff");
    grad.addColorStop(1, "#ccc");
  }
  ctx.beginPath();
  ctx.arc(x, y, PIECE_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = player === 1 ? "#000" : "#999";
  ctx.lineWidth = 1;
  ctx.stroke();
}

function placePiece(r, c) {
  if (gameOver || board[r][c]) { playInvalidSound(); return; }
  board[r][c] = currentPlayer;
  history.push({ r, c, player: currentPlayer });
  playPlaceSound();

  if (checkWin(r, c, currentPlayer)) {
    gameOver = true;
    draw();
    setTimeout(playWinSound, 200);
    const name = currentPlayer === 1 ? "黑棋" : "白棋";
    document.getElementById("status").textContent = name + " 获胜!";
    if (currentPlayer === 1) scores.black++;
    else scores.white++;
    updateScores();
    return;
  }
  if (history.length === GRID * GRID) {
    gameOver = true;
    draw();
    document.getElementById("status").textContent = "平局!";
    scores.draw++;
    updateScores();
    return;
  }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateTurn();
  draw();
}

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    // forward
    for (let i = 1; i < 5; i++) {
      const nr = r + dr * i, nc = c + dc * i;
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) break;
      if (board[nr][nc] !== player) break;
      count++;
    }
    // backward
    for (let i = 1; i < 5; i++) {
      const nr = r - dr * i, nc = c - dc * i;
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) break;
      if (board[nr][nc] !== player) break;
      count++;
    }
    if (count >= 5) return true;
  }
  return false;
}

function updateTurn() {
  const dot = document.getElementById("turnDot");
  const text = document.getElementById("turnText");
  dot.className = "turn-dot " + (currentPlayer === 1 ? "black" : "white");
  text.textContent = currentPlayer === 1 ? "黑棋" : "白棋";
}

function updateScores() {
  document.getElementById("blackScore").textContent = scores.black;
  document.getElementById("whiteScore").textContent = scores.white;
  document.getElementById("drawScore").textContent = scores.draw;
}

// click handler
canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.round((x - PADDING) / CELL);
  const r = Math.round((y - PADDING) / CELL);
  if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;
  placePiece(r, c);
});

// undo
document.getElementById("undoBtn").addEventListener("click", () => {
  if (history.length === 0 || gameOver) return;
  const last = history.pop();
  board[last.r][last.c] = 0;
  currentPlayer = last.player;
  updateTurn();
  draw();
});

// restart
document.getElementById("restartBtn").addEventListener("click", init);

init();
</script>
</body>
</html>
